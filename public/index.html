<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LAN Chat</title>
<script src="https://unpkg.com/vue@3/dist/vue.global.prod.js"></script>
<style>
  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2a2a2a;
    --text: #e5e5e5;
    --text2: #888;
    --accent: #7E45F2;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100dvh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }
  .container {
    width: 600px;
    height: 850px;
    min-width: 360px;
    min-height: 400px;
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: 16px;
    overflow: hidden;
    background: var(--surface);
    position: relative;
  }
  @media (max-width: 640px) {
    .container { width: 100% !important; height: 100dvh !important; border-radius: 0; border: none; }
  }

  /* Resize handle */
  .resize-handle {
    position: absolute;
    bottom: 0;
    right: 0;
    width: 20px;
    height: 20px;
    cursor: nwse-resize;
    z-index: 10;
  }
  .resize-handle::after {
    content: '';
    position: absolute;
    bottom: 4px;
    right: 4px;
    width: 10px;
    height: 10px;
    border-right: 2px solid var(--text2);
    border-bottom: 2px solid var(--text2);
    opacity: 0.4;
  }
  .resize-handle:hover::after { opacity: 0.8; }

  /* Status bar */
  .status-bar {
    padding: 6px;
    text-align: center;
    font-size: 12px;
    background: #dc2626;
    color: #fff;
    flex-shrink: 0;
  }

  /* Header */
  .header {
    padding: 12px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-shrink: 0;
  }
  .header h1 {
    font-size: 16px;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .header .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #22c55e;
  }

  /* Nickname bar */
  .nick-bar {
    padding: 8px 16px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .nick-bar input[type="text"] {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 10px;
    color: var(--text);
    font-size: 13px;
    outline: none;
  }
  .nick-bar input[type="text"]:focus { border-color: var(--accent); }
  .color-dot {
    width: 24px; height: 24px;
    border-radius: 50%;
    cursor: pointer;
    border: 2px solid var(--border);
    flex-shrink: 0;
  }
  .color-dot:hover { border-color: var(--text2); }

  /* Messages */
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 16px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .load-hint {
    text-align: center;
    padding: 8px;
    font-size: 12px;
    color: var(--text2);
  }

  .msg {
    max-width: 80%;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .msg.self { align-self: flex-end; }
  .msg.other { align-self: flex-start; }
  .msg-meta {
    font-size: 11px;
    color: var(--text2);
    padding: 0 4px;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .msg.self .msg-meta { flex-direction: row-reverse; }
  .msg-name { font-weight: 500; }
  .msg-bubble {
    padding: 8px 12px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.5;
    word-break: break-word;
    white-space: pre-wrap;
    position: relative;
  }
  .msg-bubble .copy-btn {
    position: absolute;
    top: 4px;
    right: 4px;
    width: 24px; height: 24px;
    border-radius: 5px;
    background: rgba(0,0,0,0.45);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .msg-bubble:hover .copy-btn { opacity: 1; }
  .copy-btn svg { width: 14px; height: 14px; stroke: #fff; fill: none; }
  .msg-bubble a {
    color: #93c5fd;
    text-decoration: underline;
    text-underline-offset: 2px;
    word-break: break-all;
  }
  .msg-bubble a:hover { color: #bfdbfe; }
  .msg.self .msg-bubble a { color: #e0d4ff; }
  .msg.self .msg-bubble a:hover { color: #fff; }
  .msg.self .msg-bubble {
    background: var(--accent);
    color: #fff;
    border-bottom-right-radius: 4px;
  }
  .msg.other .msg-bubble {
    background: var(--surface2);
    border-bottom-left-radius: 4px;
  }

  /* Image wrapper */
  .msg-img-wrap {
    position: relative;
    display: inline-block;
  }
  .msg-img-wrap img {
    max-width: 100%;
    max-height: 300px;
    border-radius: 8px;
    cursor: pointer;
    display: block;
  }
  .img-actions {
    position: absolute;
    top: 6px;
    right: 6px;
    display: flex;
    gap: 4px;
    opacity: 0;
    transition: opacity 0.15s;
  }
  .msg-img-wrap:hover .img-actions { opacity: 1; }
  .img-actions button {
    width: 28px; height: 28px;
    border-radius: 6px;
    background: rgba(0,0,0,0.55);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .img-actions button:hover { background: rgba(0,0,0,0.75); }
  .img-actions svg { width: 14px; height: 14px; stroke: #fff; fill: none; }

  /* File card */
  .file-card {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 4px 2px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    min-width: 180px;
  }
  .file-card:hover { opacity: 0.85; }
  .file-icon {
    width: 36px; height: 36px;
    border-radius: 8px;
    background: rgba(126,69,242,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }
  .file-icon svg { width: 18px; height: 18px; stroke: var(--accent); fill: none; }
  .msg.self .file-icon { background: rgba(255,255,255,0.15); }
  .msg.self .file-icon svg { stroke: #fff; }
  .file-info { overflow: hidden; }
  .file-name {
    font-size: 13px;
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 200px;
  }
  .file-size { font-size: 11px; opacity: 0.6; }

  .msg-time {
    font-size: 10px;
    color: var(--text2);
    opacity: 0.6;
  }

  /* Date divider */
  .date-divider {
    text-align: center;
    font-size: 11px;
    color: var(--text2);
    padding: 8px 0;
    position: relative;
  }
  .date-divider span {
    background: var(--bg);
    padding: 0 12px;
    position: relative;
    z-index: 1;
  }
  .date-divider::before {
    content: '';
    position: absolute;
    left: 0; right: 0; top: 50%;
    border-top: 1px solid var(--border);
  }

  /* New message badge */
  .new-msg-badge {
    position: absolute;
    bottom: 70px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--accent);
    color: #fff;
    font-size: 12px;
    font-weight: 500;
    padding: 5px 14px;
    border-radius: 20px;
    cursor: pointer;
    z-index: 5;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
    transition: opacity 0.15s;
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .new-msg-badge:hover { opacity: 0.9; }
  .new-msg-badge svg { width: 14px; height: 14px; }

  /* Input area */
  .input-area {
    padding: 10px 16px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: flex;
    align-items: flex-end;
    gap: 8px;
    flex-shrink: 0;
  }
  .input-area textarea {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 12px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    max-height: 120px;
    min-height: 40px;
    line-height: 1.4;
  }
  .input-area textarea:focus { border-color: var(--accent); }
  .btn {
    width: 40px; height: 40px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: background 0.15s;
  }
  .btn-img { background: var(--surface2); color: var(--text2); }
  .btn-img:hover { background: var(--border); }
  .btn-send { background: var(--accent); color: #fff; }
  .btn-send:hover { background: #6b35d9; }
  .btn svg { width: 20px; height: 20px; }

  /* Overlay */
  .overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.9);
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: zoom-out;
  }
  .overlay img { max-width: 95%; max-height: 95%; object-fit: contain; }

  /* Drag overlay */
  .drag-overlay {
    position: fixed;
    inset: 0;
    background: rgba(126,69,242,0.15);
    border: 3px dashed var(--accent);
    z-index: 90;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    color: var(--accent);
    font-weight: 600;
    pointer-events: none;
  }

  /* Upload toast */
  .upload-toast {
    position: fixed;
    bottom: 80px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    color: var(--text2);
    z-index: 50;
  }
</style>
</head>
<body>
<div id="app">
  <div class="container" ref="containerEl" :style="containerStyle"
    @dragenter.prevent="dragCounter++"
    @dragleave.prevent="dragCounter--"
    @dragover.prevent
    @drop.prevent="onDrop">

    <!-- Resize handle -->
    <div class="resize-handle" @mousedown.prevent="startResize"></div>

    <!-- Status bar -->
    <div class="status-bar" v-if="!connected">连接断开，正在重连...</div>

    <!-- Header -->
    <div class="header">
      <h1><span class="dot"></span> LAN Chat</h1>
    </div>

    <!-- Nickname bar -->
    <div class="nick-bar">
      <input type="color" class="color-dot" v-model="color" @input="savePrefs">
      <input type="text" v-model="nickname" @input="savePrefs" placeholder="输入昵称（可选）" maxlength="20">
    </div>

    <!-- Messages -->
    <div class="messages" ref="messagesEl" @scroll="onScroll">
      <div class="load-hint" v-if="loadingMore">加载中...</div>
      <div class="load-hint" v-else-if="!hasMore && messages.length > 0">没有更多消息了</div>

      <template v-for="(msg, i) in messages" :key="msg.id">
        <div class="date-divider" v-if="showDateDivider(i)">
          <span>{{ formatDate(msg.created_at) }}</span>
        </div>
        <div class="msg" :class="msg.sender_id === myId ? 'self' : 'other'">
          <div class="msg-meta">
            <span class="msg-name" :style="{ color: msg.sender_color }">{{ msg.sender_name }}</span>
            <span class="msg-time">{{ formatTime(msg.created_at) }}</span>
          </div>
          <div class="msg-bubble" v-if="msg.type === 'text'"><span v-html="linkify(msg.content)"></span>
            <button class="copy-btn" @click.stop="copyText(msg.content)" title="复制">
              <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
              </svg>
            </button>
          </div>
          <div class="msg-bubble" v-else-if="msg.type === 'image'">
            <div class="msg-img-wrap">
              <img :src="msg.content" loading="lazy" @click="previewSrc = msg.content">
              <div class="img-actions">
                <button @click.stop="downloadImg(msg.content)" title="下载">
                  <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                    <polyline points="7 10 12 15 17 10"/>
                    <line x1="12" y1="15" x2="12" y2="3"/>
                  </svg>
                </button>
              </div>
            </div>
          </div>
          <div class="msg-bubble" v-else-if="msg.type === 'file'">
            <a class="file-card" :href="parseFile(msg.content).url" download @click.stop>
              <div class="file-icon">
                <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
                  <polyline points="14 2 14 8 20 8"/>
                </svg>
              </div>
              <div class="file-info">
                <div class="file-name">{{ parseFile(msg.content).name }}</div>
                <div class="file-size">{{ formatSize(parseFile(msg.content).size) }}</div>
              </div>
            </a>
          </div>
        </div>
      </template>
    </div>

    <!-- New message badge -->
    <div class="new-msg-badge" v-if="newMsgCount > 0" @click="scrollBottom()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
      {{ newMsgCount }} 条新消息
    </div>

    <!-- Input area -->
    <div class="input-area">
      <button class="btn btn-img" @click="$refs.anyFileInput.click()" title="发送文件">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>
      <button class="btn btn-img" @click="$refs.fileInput.click()" title="发送图片">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
      </button>
      <textarea ref="inputEl" v-model="inputText" rows="1" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)"
        @keydown.enter.exact.prevent="sendText"
        @input="autoResize"
        @paste="onPaste"></textarea>
      <button class="btn btn-send" @click="sendText" title="发送">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- Image preview overlay -->
  <div class="overlay" v-if="previewSrc" @click="previewSrc = null">
    <img :src="previewSrc">
  </div>

  <!-- Drag overlay -->
  <div class="drag-overlay" v-if="dragCounter > 0">松开发送文件</div>

  <!-- Upload toast -->
  <div class="upload-toast" v-if="uploading">文件上传中...</div>
  <div class="upload-toast" v-if="toast">{{ toast }}</div>

  <!-- Hidden file inputs -->
  <input type="file" ref="fileInput" accept="image/*" style="display:none" @change="onFileSelect">
  <input type="file" ref="anyFileInput" style="display:none" @change="onAnyFileSelect">
</div>

<script>
const { createApp, ref, nextTick, onMounted, onUnmounted } = Vue;

createApp({
  setup() {
    // ── Identity ──
    const myId = localStorage.getItem('lan-chat-id') || (() => {
      const id = Math.random().toString(36).slice(2, 10);
      localStorage.setItem('lan-chat-id', id);
      return id;
    })();

    // ── State ──
    const nickname = ref(localStorage.getItem('lan-chat-nick') || '');
    const color = ref(localStorage.getItem('lan-chat-color') || '#7E45F2');
    const messages = ref([]);
    const inputText = ref('');
    const connected = ref(false);
    const previewSrc = ref(null);
    const uploading = ref(false);
    const dragCounter = ref(0);
    const hasMore = ref(true);
    const loadingMore = ref(false);
    const oldestId = ref(0);

    // ── Refs ──
    const messagesEl = ref(null);
    const inputEl = ref(null);
    const fileInput = ref(null);
    const anyFileInput = ref(null);
    const containerEl = ref(null);

    // ── Resize ──
    const savedSize = JSON.parse(localStorage.getItem('lan-chat-size') || 'null');
    const containerW = ref(savedSize?.w || 600);
    const containerH = ref(savedSize?.h || 850);
    const containerStyle = { width: containerW.value + 'px', height: containerH.value + 'px' };

    function startResize(e) {
      const startX = e.clientX;
      const startY = e.clientY;
      const startW = containerEl.value.offsetWidth;
      const startH = containerEl.value.offsetHeight;

      function onMove(ev) {
        const w = Math.max(360, startW + (ev.clientX - startX));
        const h = Math.max(400, startH + (ev.clientY - startY));
        containerEl.value.style.width = w + 'px';
        containerEl.value.style.height = h + 'px';
      }
      function onUp() {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup', onUp);
        const w = containerEl.value.offsetWidth;
        const h = containerEl.value.offsetHeight;
        containerW.value = w;
        containerH.value = h;
        localStorage.setItem('lan-chat-size', JSON.stringify({ w, h }));
      }
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup', onUp);
    }

    // ── Prefs ──
    function savePrefs() {
      localStorage.setItem('lan-chat-nick', nickname.value);
      localStorage.setItem('lan-chat-color', color.value);
    }

    // ── WebSocket ──
    let ws = null;
    let reconnectTimer = null;

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      ws = new WebSocket(proto + '://' + location.host);
      ws.onopen = () => { connected.value = true; clearTimeout(reconnectTimer); };
      ws.onmessage = (e) => {
        const { type, data } = JSON.parse(e.data);
        if (type === 'message') {
          const atBottom = isNearBottom();
          messages.value.push(data);
          if (atBottom || data.sender_id === myId) {
            nextTick(scrollBottom);
          } else {
            newMsgCount.value++;
          }
        }
      };
      ws.onclose = () => { connected.value = false; reconnectTimer = setTimeout(connect, 2000); };
      ws.onerror = () => ws.close();
    }

    // ── History ──
    async function loadHistory(initial) {
      if (loadingMore.value || !hasMore.value) return;
      loadingMore.value = true;
      try {
        const url = oldestId.value ? '/api/messages?before=' + oldestId.value : '/api/messages';
        const res = await fetch(url);
        const data = await res.json();
        hasMore.value = data.hasMore;
        if (data.messages.length > 0) {
          oldestId.value = data.messages[0].id;
          const el = messagesEl.value;
          const prevHeight = el.scrollHeight;
          messages.value.unshift(...data.messages);
          if (initial) {
            await nextTick();
            scrollBottomAfterImages();
          } else {
            await nextTick();
            el.scrollTop = el.scrollHeight - prevHeight;
          }
        }
      } catch (e) {
        console.error('Failed to load history:', e);
      } finally {
        loadingMore.value = false;
      }
    }

    function onScroll() {
      if (messagesEl.value.scrollTop < 60 && hasMore.value && !loadingMore.value) {
        loadHistory(false);
      }
      if (isNearBottom()) newMsgCount.value = 0;
    }

    // ── Formatting ──
    function formatDate(ts) { return new Date(ts).toLocaleDateString('zh-CN'); }
    function formatTime(ts) { return new Date(ts).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }
    function showDateDivider(i) {
      if (i === 0) return true;
      return formatDate(messages.value[i].created_at) !== formatDate(messages.value[i - 1].created_at);
    }

    // ── Send ──
    function wsSend(type, content) {
      if (!ws || ws.readyState !== 1) return;
      ws.send(JSON.stringify({
        type,
        content,
        sender_id: myId,
        sender_name: nickname.value || '匿名',
        sender_color: color.value,
      }));
    }

    function sendText() {
      const text = inputText.value.trim();
      if (!text) return;
      wsSend('text', text);
      inputText.value = '';
      nextTick(() => {
        if (inputEl.value) { inputEl.value.style.height = 'auto'; }
      });
    }

    function autoResize() {
      const el = inputEl.value;
      if (!el) return;
      el.style.height = 'auto';
      el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    }

    const newMsgCount = ref(0);

    function isNearBottom() {
      const el = messagesEl.value;
      if (!el) return true;
      return el.scrollHeight - el.scrollTop - el.clientHeight < 100;
    }

    function scrollBottom() {
      const el = messagesEl.value;
      if (el) {
        el.scrollTop = el.scrollHeight;
        newMsgCount.value = 0;
      }
    }

    // Wait for all images to load then scroll (for initial load)
    function scrollBottomAfterImages() {
      const el = messagesEl.value;
      if (!el) return;
      const imgs = el.querySelectorAll('img');
      if (imgs.length === 0) { scrollBottom(); return; }
      let loaded = 0;
      const check = () => { if (++loaded >= imgs.length) scrollBottom(); };
      imgs.forEach(img => {
        if (img.complete) { check(); }
        else { img.addEventListener('load', check); img.addEventListener('error', check); }
      });
      // Fallback in case events don't fire
      setTimeout(scrollBottom, 1500);
    }

    // ── Upload ──
    async function doUpload(file) {
      uploading.value = true;
      try {
        const fd = new FormData();
        fd.append('file', file);
        const res = await fetch('/upload', { method: 'POST', body: fd });
        const { url, error } = await res.json();
        if (error) throw new Error(error);
        return url;
      } catch (e) {
        alert('上传失败: ' + e.message);
        return null;
      } finally {
        uploading.value = false;
      }
    }

    async function sendFile(file) {
      if (!file) return;
      const url = await doUpload(file);
      if (!url) return;
      if (file.type.startsWith('image/')) {
        wsSend('image', url);
      } else {
        wsSend('file', JSON.stringify({ url, name: file.name, size: file.size }));
      }
    }

    function onFileSelect(e) {
      const file = e.target.files[0];
      if (file) sendFile(file);
      e.target.value = '';
    }

    function onAnyFileSelect(e) {
      const file = e.target.files[0];
      if (file) sendFile(file);
      e.target.value = '';
    }

    function onPaste(e) {
      const items = e.clipboardData?.items;
      if (!items) return;
      for (const item of items) {
        if (item.type.startsWith('image/')) {
          e.preventDefault();
          sendFile(item.getAsFile());
          break;
        }
      }
    }

    function onDrop(e) {
      dragCounter.value = 0;
      const files = e.dataTransfer?.files;
      if (!files) return;
      for (const file of files) {
        sendFile(file);
      }
    }

    // ── File helpers ──
    function parseFile(content) {
      try { return JSON.parse(content); }
      catch { return { url: content, name: 'file', size: 0 }; }
    }

    function linkify(text) {
      const escaped = text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
      return escaped.replace(
        /(https?:\/\/[^\s<]+)/g,
        '<a href="$1" target="_blank" rel="noopener" onclick="event.stopPropagation()">$1</a>'
      );
    }

    function formatSize(bytes) {
      if (!bytes) return '';
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    // ── Download ──
    function downloadImg(src) {
      fetch(src).then(r => r.blob()).then(blob => {
        const a = document.createElement('a');
        a.href = URL.createObjectURL(blob);
        a.download = src.split('/').pop() || 'image.png';
        a.click();
        URL.revokeObjectURL(a.href);
      });
    }

    // ── Copy ──
    const toast = ref('');
    let toastTimer = null;

    function showToast(msg) {
      toast.value = msg;
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { toast.value = ''; }, 1500);
    }

    function copyText(text) {
      if (navigator.clipboard && window.isSecureContext) {
        navigator.clipboard.writeText(text).then(() => showToast('已复制'));
      } else {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.cssText = 'position:fixed;left:-9999px';
        document.body.appendChild(ta);
        ta.select();
        document.execCommand('copy');
        document.body.removeChild(ta);
        showToast('已复制');
      }
    }

    // ── Init ──
    function focusInput() {
      if (inputEl.value) inputEl.value.focus();
    }

    onMounted(() => {
      loadHistory(true);
      connect();
      focusInput();
      setTimeout(focusInput, 300);
      setTimeout(focusInput, 800);
      window.addEventListener('focus', focusInput);
      document.addEventListener('visibilitychange', () => {
        if (!document.hidden) focusInput();
      });
    });

    onUnmounted(() => {
      clearTimeout(reconnectTimer);
      if (ws) ws.close();
      window.removeEventListener('focus', focusInput);
    });

    return {
      myId, nickname, color, messages, inputText, connected,
      previewSrc, uploading, dragCounter, hasMore, loadingMore, newMsgCount, toast,
      messagesEl, inputEl, fileInput, anyFileInput, containerEl, containerStyle,
      savePrefs, onScroll, formatDate, formatTime, showDateDivider,
      sendText, autoResize, scrollBottom, onFileSelect, onAnyFileSelect, onPaste, onDrop,
      downloadImg, copyText, startResize, parseFile, formatSize, linkify,
    };
  }
}).mount('#app');
</script>
</body>
</html>
